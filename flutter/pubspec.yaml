name: device_control_app
description: A cross-platform app for remotely controlling devices with glassmorphism UI.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  go_router: ^10.0.0
  google_fonts: ^6.0.0
  glass_morphism: ^3.0.0
  flutter_glassmorphism: ^1.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Permissions
  permission_handler: ^11.4.0
  
  # Location
  geolocator: ^9.0.0
  location: ^4.4.0
  
  # Camera & Media
  camera: ^0.10.0
  image_picker: ^0.8.0
  
  # Contacts & Calendar
  contacts_service: ^0.6.3
  table_calendar: ^3.0.0
  
  # Bluetooth
  flutter_blue_plus: ^1.30.0
  
  # Notifications
  flutter_local_notifications: ^14.0.0
  
  # Device Info
  device_info_plus: ^9.0.0
  package_info_plus: ^3.0.0
  
  # Biometrics
  local_auth: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplay-Regular.otf
        - asset: assets/fonts/SFProDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/SFProDisplay-Bold.otf
          weight: 700
